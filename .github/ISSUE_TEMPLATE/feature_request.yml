name: Feature request
description: Suggest an improvement to OB-1
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard, slow, confusing, or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should OB-1 do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Onboarding / providers
        - Agent loop / tools
        - Memory
        - Multi-agent modes
        - MCP / extensions
        - Install / packaging
        - Documentation
        - Other
    validations:
      required: true
