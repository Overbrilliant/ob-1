name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, e.g. v0.1.1"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build_one() {
            local asset="$1"
            local target="$2"
            local work="dist/${asset}"
            mkdir -p "$work"
            bun run scripts/build-bin.ts "$work/ob1" "$target"
            tar -C "$work" -czf "dist/${asset}.tar.gz" ob1
            rm -rf "$work"
          }

          build_one "ob1-darwin-arm64" "bun-darwin-arm64"
          build_one "ob1-darwin-x64" "bun-darwin-x64"
          build_one "ob1-linux-arm64" "bun-linux-arm64"
          build_one "ob1-linux-x64" "bun-linux-x64-baseline"

          cp scripts/install.sh dist/install.sh
          (cd dist && shasum -a 256 *.tar.gz install.sh > checksums.txt)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/checksums.txt dist/install.sh --clobber
          else
            gh release create "$tag" dist/*.tar.gz dist/checksums.txt dist/install.sh \
              --title "OB-1 ${tag}" \
              --notes "Release ${tag}" \
              --target "$GITHUB_SHA"
          fi
