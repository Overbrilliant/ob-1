name: public eval

on:
  workflow_dispatch:
    inputs:
      modes:
        description: "Modes to run, space-separated"
        default: "solo fusion council personas"
        required: true
      trials:
        description: "Trials per task"
        default: "1"
        required: true
      task:
        description: "Optional comma-separated task ids"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  eval:
    name: compute-matched eval
    runs-on: ubuntu-latest
    env:
      OB1_BASE_URL: ${{ secrets.OB1_EVAL_BASE_URL }}
      OB1_API_KEY: ${{ secrets.OB1_EVAL_API_KEY }}
      OB1_MODEL: ${{ secrets.OB1_EVAL_MODEL }}
      OB1_SERVER: ${{ secrets.OB1_EVAL_SERVER }}
      OB1_TOKEN: ${{ secrets.OB1_EVAL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Run eval
        shell: bash
        env:
          EVAL_MODES: ${{ inputs.modes }}
          EVAL_TRIALS: ${{ inputs.trials }}
          EVAL_TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail

          if [ -z "${OB1_BASE_URL:-}" ] && [ -z "${OB1_TOKEN:-}" ]; then
            echo "::notice::Set OB1_EVAL_BASE_URL/OB1_EVAL_API_KEY or OB1_EVAL_SERVER/OB1_EVAL_TOKEN to run the public eval."
            exit 0
          fi

          mkdir -p eval-artifacts
          {
            echo "# OB-1 Eval Run"
            echo
            echo "- Git SHA: ${GITHUB_SHA}"
            echo "- Modes: ${EVAL_MODES}"
            echo "- Trials: ${EVAL_TRIALS}"
            echo "- Task filter: ${EVAL_TASK:-all}"
            echo "- Model: ${OB1_MODEL:-default route model}"
            echo
          } > eval-artifacts/metadata.md

          export OB1_EVAL_TRIALS="${EVAL_TRIALS}"
          if [ -n "${EVAL_TASK}" ]; then
            export OB1_EVAL_TASK="${EVAL_TASK}"
          fi

          read -r -a modes <<< "${EVAL_MODES}"
          bun run scripts/eval.ts "${modes[@]}" 2>&1 | tee eval-artifacts/report.txt
      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ob1-eval-report
          path: eval-artifacts/
          if-no-files-found: ignore
